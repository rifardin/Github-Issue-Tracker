<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GITHUB ISSUES TRACKER</title>
    <link rel="shortcut icon" href="./assets/github-logo.png">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">                      
</head>
<body class="bg-gray-50 min-h-screen ">

    <nav class="bg-white border-b border-gray-200 px-6 py-4 flex flex-wrap items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <img class="w-[36px]" src="/assets/github-logo.png" alt="">
            <span class="text-xl font-semibold  text-[#1F2937]">GitHub Issues Tracker</span>
        </div>
        <div class="flex items-center gap-3 mt-4 md:mt-0 w-full md:w-auto">
            <div class="relative w-full md:w-72">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-[#E4E4E7]"></i>
                <input type="text" id="searchInput" placeholder="Search issues..." 
                    class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-lg">
            </div>
            <button class="bg-[#4A00FF] text-[#FFFFFF] px-4 py-2 rounded-lg text-sm font-semibold hover:bg-[#4A00FF80] whitespace-nowrap ">+ New Issue</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
      <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm mb-6 w-full">
    
    <div class="flex gap-2">
        <button onclick="filterIssues('all', event)" class="tab-btn px-12 py-2.5 rounded-lg text-sm font-bold bg-[#4F00FF] text-white transition">
            All
        </button>
        
        <button onclick="filterIssues('open', event)" class="tab-btn px-12 py-2.5 rounded-lg text-sm font-bold text-gray-500 border border-gray-100 hover:bg-gray-50 transition">
            Open
        </button>
        
        <button onclick="filterIssues('closed', event)" class="tab-btn px-12 py-2.5 rounded-lg text-sm font-bold text-gray-500 border border-gray-100 hover:bg-gray-50 transition">
            Closed
        </button>
    </div>

</div>

        <div id="" class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="bg-blue-50 p-3 rounded-full text-blue-600">
                        <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h2 class="text-2xl font-extrabold text-[#1F2937]"><span id="count">50</span> Issues</h2>
                        <p class="text-xs text-[#64748B] font-medium">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="hidden sm:flex gap-4 text-xs font-bold uppercase tracking-wider">
                    <span class="flex items-center gap-2"><span class="w-3 h-3 bg-[#00A96E] rounded-full"></span> Open</span>
                    <span class="flex items-center gap-2"><span class="w-3 h-3 bg-[#A855F7] rounded-full"></span> Closed</span>
                </div>
            </div>



<div id="issueGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 p-6">
    

    </main>

    <div id="modal" class="fixed inset-0 bg-slate-900/50 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl max-w-lg w-full p-9 shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-black text-2xl">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>
    <script src="./script/home.js"></script>
</body>
</html>
