<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GITHUB ISSUES TRACKER</title>
    <link rel="shortcut icon" href="./assets/github-logo.png">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-sm w-11/12 mx-auto max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <img src="./assets/github-logo.png" alt="">
            </div>
            <h1 class="text-3xl font-bold text-[#1F2937]">GitHub Issues Tracker</h1>
            <p class="text-[#64748B] mt-2">Sign in to manage your issues</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-semibold text-[#1F2937] mb-2">Username</label>
                <input type="text" id="username" placeholder="Enter Username" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-md ">
                <p class="text-xs text-[#4A00FF] mt-1">Default: admin</p>
            </div>

            <div>
                <label for="password" class="block text-sm font-semibold text-[#1F2937] mb-2">Password</label>
                <input type="password" id="password" placeholder="Enter Password" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-md ">

                <p class="text-xs text-[#4A00FF] mt-1">Default: admin123</p>
            </div>

            <button type="submit" 
                class="w-full bg-[#4A00FF] hover:bg-[#4A00FF90] text-[#FFFFFF] font-semibold py-3 rounded-md ">
                Sign In
            </button>
        </form>

        <div class="relative flex py-8 items-center">
            <div class="flex-grow border-t border-[#E4E4E7]"></div>
            <span class="flex mx-4 text-[#1F2937] text-sm">OR</span>
            <div class="flex-grow border-t border-[#E4E4E7]"></div>
        </div>

        <div class="bg-gray-50 p-6 rounded-lg text-center border border-gray-100">
            <p class="text-[#64748B] text-sm mb-3">Demo Credentials:</p>
            <p class="text-[#1F2937]"><strong>Username:</strong> admin</p>
            <p class="text-[#1F2937]"><strong>Password:</strong> admin123</p>
        </div>
    </div>

    <script src="./script/script.js"></script>
</body>
</html>
